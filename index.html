<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智學自習室 - 專業預約系統 (GitHub 版)</title>
    <!-- 使用 Tailwind CSS CDN 提供現代化 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: #f1f5f9; 
        }
        .ticket-cut {
            position: relative;
        }
        .ticket-cut::before, .ticket-cut::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background-color: #f1f5f9;
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .ticket-cut::before { left: -11px; }
        .ticket-cut::after { right: -11px; }
        
        .seat-btn.occupied {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            pointer-events: none;
        }
        .seat-btn.selected {
            background-color: #2563eb;
            color: white;
            border-color: #1e40af;
        }
    </style>
</head>
<body class="antialiased text-slate-900 pb-20">

    <div class="max-w-6xl mx-auto px-4 pt-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-slate-900">智學自習室 <span class="text-blue-600">Booking</span></h1>
                <p class="text-slate-500 mt-1">基於 LocalStorage 的純前端預約架構</p>
            </div>
            <div id="stats" class="flex gap-4">
                <!-- 統計資訊 -->
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左側：座位選擇 (Input 1) -->
            <div class="lg:col-span-8 bg-white rounded-[2rem] shadow-sm border border-slate-200 p-8">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                        選擇您的座位
                    </h2>
                    <span class="text-sm font-medium px-4 py-1.5 bg-slate-100 rounded-full text-slate-500" id="current-day"></span>
                </div>

                <div id="seat-grid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-8 gap-3 mb-10">
                    <!-- 座位圖由 JS 生成 -->
                </div>

                <!-- 圖例 -->
                <div class="flex flex-wrap gap-6 text-xs font-bold uppercase tracking-widest text-slate-400 border-t border-slate-100 pt-6">
                    <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-white border border-slate-300"></div> 可預約</div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-blue-600"></div> 已選擇</div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-slate-200"></div> 已被佔用</div>
                </div>
            </div>

            <!-- 右側：表單 (Input 2 & Processing) -->
            <div class="lg:col-span-4">
                <div class="bg-slate-900 rounded-[2rem] p-8 text-white shadow-2xl sticky top-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        填寫預約詳情
                    </h2>
                    
                    <form id="booking-form" class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">已選座位</label>
                            <input type="text" id="display-seat" readonly placeholder="請先點選左側座位" 
                                class="w-full bg-slate-800 border-none rounded-2xl px-5 py-4 text-white font-bold focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">姓名</label>
                                <input type="text" id="input-name" required placeholder="張小明" 
                                    class="w-full bg-slate-800 border-none rounded-2xl px-5 py-4 text-white focus:ring-2 focus:ring-blue-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">學號</label>
                                <input type="text" id="input-sid" required placeholder="A12345" 
                                    class="w-full bg-slate-800 border-none rounded-2xl px-5 py-4 text-white focus:ring-2 focus:ring-blue-500 transition-all">
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">選擇時段 (可多選)</label>
                            <div class="grid grid-cols-2 gap-2" id="time-slots-container">
                                <!-- 時段按鈕由 JS 生成 -->
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-900/20 transition-all active:scale-95 mt-4">
                            確認並鎖定預約
                        </button>
                    </form>
                    
                    <p class="mt-6 text-[10px] text-slate-500 text-center uppercase tracking-tighter">
                        數據將永久儲存於您的瀏覽器 LocalStorage 中
                    </p>
                </div>
            </div>
        </div>

        <!-- 下方：列表 (Retrieval & Output) -->
        <div class="mt-20">
            <div class="flex items-end justify-between mb-10">
                <h2 class="text-3xl font-black tracking-tight">預約清單 <span class="text-blue-600" id="total-count">0</span></h2>
                <button onclick="clearAll()" class="text-xs font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest">清空所有紀錄</button>
            </div>
            
            <div id="record-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 預約卡片將由 JS 生成 -->
            </div>
        </div>
    </div>

    <script>
        /**
         * --- 核心配置 ---
         */
        const STORAGE_KEY = "records";
        const TIME_SLOTS = ["08:00-10:00", "10:00-12:00", "12:00-14:00", "14:00-16:00", "16:00-18:00", "18:00-20:00"];
        const SEATS = Array.from({length: 40}, (_, i) => {
            const row = String.fromCharCode(65 + Math.floor(i / 8));
            const num = (i % 8) + 1;
            return `${row}${num}`;
        });

        let currentSelectedSeat = null;
        let currentSelectedSlots = [];

        /**
         * --- 規則要求的三大函數 ---
         */

        // 6a. 儲存紀錄 (saveData)
        function saveData(newRecord) {
            const records = loadData();
            records.unshift(newRecord); // 存放在最前面
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderList();
        }

        // 6b. 讀取數據 (loadData)
        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        // 6c. 渲染列表 (renderList)
        function renderList() {
            const records = loadData();
            const listContainer = document.getElementById('record-list');
            const totalCountEl = document.getElementById('total-count');
            
            totalCountEl.innerText = records.length;

            if (records.length === 0) {
                listContainer.innerHTML = `
                    <div class="col-span-full py-20 border-2 border-dashed border-slate-200 rounded-[2rem] flex flex-col items-center justify-center text-slate-400">
                        <p class="font-bold uppercase tracking-widest text-xs">目前尚無任何預約紀錄</p>
                    </div>
                `;
            } else {
                listContainer.innerHTML = records.map(r => `
                    <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">${r.status}</div>
                                <div class="text-[10px] font-mono text-slate-300">#${r.id.split('_')[1]}</div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="text-5xl font-black text-slate-900">${r.seatId}</div>
                                <div class="h-10 w-[1px] bg-slate-100"></div>
                                <div class="space-y-1">
                                    <p class="text-xs font-black text-slate-400 uppercase tracking-tighter">學生 / Student</p>
                                    <p class="text-md font-bold text-slate-700">${r.userName}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-slate-50 p-6 ticket-cut border-t border-slate-100 border-dashed">
                            <div class="space-y-3">
                                <div class="flex justify-between text-xs">
                                    <span class="font-bold text-slate-400 uppercase tracking-widest">日期 Date</span>
                                    <span class="font-black text-slate-700">${r.date}</span>
                                </div>
                                <div class="flex justify-between text-xs">
                                    <span class="font-bold text-slate-400 uppercase tracking-widest">時段 Slots</span>
                                    <span class="font-black text-blue-600">${r.timeSlots.join(', ')}</span>
                                </div>
                            </div>
                            <div class="mt-4 pt-4 border-t border-slate-200/40 flex justify-between items-center">
                                <span class="text-[8px] font-mono text-slate-300">CREATED: ${r.createdAt}</span>
                                <span class="text-[8px] font-mono text-slate-300">SID: ${r.studentId}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // 更新座位圖佔用狀態
            refreshSeatStatus(records);
        }

        /**
         * --- 輔助邏輯與手動 UI 綁定 ---
         */

        function init() {
            // 設定今日日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('current-day').innerText = `📅 ${today}`;

            // 生成座位圖
            const grid = document.getElementById('seat-grid');
            grid.innerHTML = SEATS.map(s => `
                <button type="button" 
                    id="seat-${s}" 
                    onclick="selectSeat('${s}')" 
                    class="seat-btn aspect-square border border-slate-200 bg-white rounded-2xl flex items-center justify-center font-black text-slate-800 text-sm transition-all hover:border-blue-400 hover:scale-105 active:scale-95 shadow-sm">
                    ${s}
                </button>
            `).join('');

            // 生成時段選擇
            const slotsContainer = document.getElementById('time-slots-container');
            slotsContainer.innerHTML = TIME_SLOTS.map(t => `
                <button type="button" 
                    id="slot-${t}"
                    onclick="toggleSlot('${t}')"
                    class="slot-btn bg-slate-800 text-slate-400 border border-transparent px-3 py-3 rounded-xl text-[10px] font-bold transition-all hover:text-white">
                    ${t}
                </button>
            `).join('');

            // 監聽提交
            document.getElementById('booking-form').addEventListener('submit', (e) => {
                e.preventDefault();
                handleFormSubmit();
            });

            // 執行第一次渲染
            renderList();
        }

        function refreshSeatStatus(records) {
            // 重置
            document.querySelectorAll('.seat-btn').forEach(btn => btn.classList.remove('occupied'));
            
            // 標記 (此處簡單判斷，只要有紀錄即標記為佔用，實際可依日期/時段更精確)
            const today = new Date().toISOString().split('T')[0];
            records.forEach(r => {
                const btn = document.getElementById(`seat-${r.seatId}`);
                if (btn && r.date === today) {
                    btn.classList.add('occupied');
                    btn.innerText = "滿";
                    btn.classList.add('text-[10px]');
                }
            });
        }

        function selectSeat(id) {
            currentSelectedSeat = id;
            document.getElementById('display-seat').value = id;
            
            // UI 反饋
            document.querySelectorAll('.seat-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`seat-${id}`).classList.add('selected');
        }

        function toggleSlot(t) {
            const btn = document.getElementById(`slot-${t}`);
            if (currentSelectedSlots.includes(t)) {
                currentSelectedSlots = currentSelectedSlots.filter(s => s !== t);
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-800', 'text-slate-400');
            } else {
                currentSelectedSlots.push(t);
                btn.classList.remove('bg-slate-800', 'text-slate-400');
                btn.classList.add('bg-blue-600', 'text-white', 'scale-105');
            }
        }

        function handleFormSubmit() {
            const name = document.getElementById('input-name').value;
            const sid = document.getElementById('input-sid').value;
            const today = new Date().toISOString().split('T')[0];

            if (!currentSelectedSeat) return alert('請先選擇座位！');
            if (currentSelectedSlots.length === 0) return alert('請選擇至少一個時段！');

            // 4. 規則要求的 Data Schema
            const newRecord = {
                // 4a. 規定的 id 格式
                id: Date.now() + "_" + Math.random().toString(36).slice(2,6),
                // 4b. 規定的 createdAt 格式
                createdAt: new Date().toISOString(),
                // 4c. 主要欄位
                seatId: currentSelectedSeat,
                userName: name,
                studentId: sid,
                date: today,
                timeSlots: currentSelectedSlots,
                // 4d. 預設 status
                status: "active"
            };

            // 6a. 使用 saveData
            saveData(newRecord);

            // 重置 UI
            resetUI();
            alert('成功！預約已存入 localStorage。');
        }

        function resetUI() {
            document.getElementById('booking-form').reset();
            currentSelectedSeat = null;
            currentSelectedSlots = [];
            document.querySelectorAll('.seat-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.slot-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'scale-105');
                btn.classList.add('bg-slate-800', 'text-slate-400');
            });
        }

        function clearAll() {
            if (confirm('確定要永久刪除所有紀錄嗎？')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // 啟動系統
        init();
    </script>
</body>
</html>
